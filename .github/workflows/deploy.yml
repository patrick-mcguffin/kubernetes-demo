name: Build and Push to ECR
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and Push Frontend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/kubernetes-eks-app/frontend:$IMAGE_TAG ./app/frontend
          docker push $ECR_REGISTRY/kubernetes-eks-app/frontend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/kubernetes-eks-app/frontend:$IMAGE_TAG $ECR_REGISTRY/kubernetes-eks-app/frontend:latest
          docker push $ECR_REGISTRY/kubernetes-eks-app/frontend:latest
      - name: Build and Push Backend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/kubernetes-eks-app/backend:$IMAGE_TAG ./app/backend
          docker push $ECR_REGISTRY/kubernetes-eks-app/backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/kubernetes-eks-app/backend:$IMAGE_TAG $ECR_REGISTRY/kubernetes-eks-app/backend:latest
          docker push $ECR_REGISTRY/kubernetes-eks-app/backend:latest
      - name: Validate Kubernetes Manifests
        run: |
          curl -LO https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/
          kubeval --recursive kubernetes/