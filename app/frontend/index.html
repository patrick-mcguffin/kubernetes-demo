<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		        <title>Kubernetes Demo App</title>
			    <style>
        * {
		            margin: 0;
			                padding: 0;
					            box-sizing: border-box;
						            }

	        body {
			            font-family: Arial, sans-serif;
				                background-color: #1a1a2e;
						            color: #eaeaea;
							                display: flex;
									            justify-content: center;
										                align-items: center;
												            min-height: 100vh;
													            }

		        .container {
				            text-align: center;
					                padding: 40px;
							            background-color: #16213e;
								                border-radius: 12px;
										            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
											                max-width: 600px;
													            width: 90%;
														            }

			        h1 {
					            font-size: 2rem;
						                margin-bottom: 10px;
								            color: #00d4ff;
									            }

				        p {
						            font-size: 1rem;
							                margin-bottom: 20px;
									            color: #a0a0b0;
										            }

					        .status-box {
							            background-color: #0f3460;
								                border-radius: 8px;
										            padding: 20px;
											                margin-top: 20px;
													        }

						        .status-box h2 {
								            font-size: 1.1rem;
									                margin-bottom: 10px;
											            color: #00d4ff;
												            }

							        #api-response {
									            font-size: 0.95rem;
										                color: #eaeaea;
												        }

								        button {
										            margin-top: 20px;
											                padding: 10px 24px;
													            background-color: #00d4ff;
														                color: #1a1a2e;
																            border: none;
																	                border-radius: 6px;
																			            font-size: 1rem;
																				                cursor: pointer;
																						            font-weight: bold;
																							            }

									        button:hover {
											            background-color: #00b8d9;
												            }
										    </style>
	</head>
	<body>
		    <div class="container">
			            <h1>Kubernetes Demo App</h1>
				            <p>A multi-tier application running on Kubernetes</p>

					            <div class="status-box">
							                <h2>Backend API Status</h2>
									            <div id="api-response">Click the button to test the backend</div>
										            </div>

											            <button onclick="callApi()">Test Backend</button>
												        </div>

													    <script>
														            async function callApi() {
																                const responseDiv = document.getElementById('api-response');
																                responseDiv.textContent = 'Calling API...';
																                try {
																			                const response = await fetch('/api/status');
																			                const data = await response.json();
																			                responseDiv.textContent = JSON.stringify(data, null, 2);
																			            } catch (error) {
																					                    responseDiv.textContent = 'Error connecting to backend: ' + error.message;
																					                }
																            }

															            // Auto call on page load
															            callApi();
															        </script>
	</body>
</html>
