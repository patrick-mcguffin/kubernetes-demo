server {
	    listen 80;

	        location / {
			        root /usr/share/nginx/html;
				        index index.html;
					        try_files $uri $uri/ /index.html;
						    }

						    location /api/ {
							        resolver 127.0.0.11; # Docker's internal DNS
								    set $backend http://backend-service;
								        proxy_pass $backend;
								}
							}
